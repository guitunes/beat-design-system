<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual de Ativação · The Beat Life Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --branco:#ffffff;--oceano:#0c1f32;--oceano-900:#08151f;--oceano-500:#1c3850;--oceano-300:#3a5670;
    --dourado:#cba052;--dourado-400:#d9b876;--floresta:#0a3a1e;--ceu:#88bee7;--areia:#efe4ce;--salvia:#809e80;
    --serif:"Cormorant Garamond",Georgia,serif;--sans:"Space Grotesk","Inter",system-ui,sans-serif;
    --txt:rgba(255,255,255,0.92);--txt-mut:rgba(255,255,255,0.55);
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--txt);background:var(--oceano);line-height:1.6;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    background-image:radial-gradient(120% 90% at 85% -5%,rgba(203,160,82,0.10),transparent 55%),
                     radial-gradient(80% 60% at 10% 110%,rgba(10,58,30,0.45),transparent 60%);
  }
  .stage{min-height:100%;max-width:1040px;margin:0 auto;padding:40px 28px 60px;
    display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:center}

  /* ---------- left: the star ---------- */
  .starwrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:26px}
  .meta-top{position:absolute;top:-18px;left:0;font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--txt-mut)}
  .meta-top b{color:var(--dourado-400);font-weight:600}
  svg.star{width:min(360px,72vw);height:auto;overflow:visible}
  .breathe{transform-origin:center;animation:breathe 7s var(--ease) infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
  .ray{stroke:var(--oceano-300);stroke-width:1.4;fill:none;
    stroke-dasharray:100;stroke-dashoffset:100;transition:stroke-dashoffset 1.2s var(--ease),stroke 1.2s ease}
  .ray.draw{stroke:rgba(203,160,82,0.55)}
  .node{fill:var(--oceano-500);stroke:var(--oceano-300);stroke-width:1.5;transition:fill 1.2s ease,stroke 1.2s ease,r .6s var(--ease)}
  .node.lit{fill:var(--dourado);stroke:var(--dourado-400);filter:drop-shadow(0 0 7px rgba(203,160,82,0.8))}
  .node.pulse{animation:pulse 2s var(--ease)}
  @keyframes pulse{0%{r:5.5}30%{r:8.5}100%{r:6.5}}
  .corehalo{fill:rgba(203,160,82,0);transition:fill 1.6s ease}
  .stage.done .corehalo{fill:rgba(203,160,82,0.10)}
  .stage.done .glow{animation:glowpulse 3s var(--ease) forwards}
  @keyframes glowpulse{0%{opacity:0}40%{opacity:1}100%{opacity:0.32}}
  .glow{opacity:0}

  .nodelabels{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .nl{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--txt-mut);
    padding:5px 12px;border:1px solid rgba(255,255,255,0.10);border-radius:999px;transition:.5s var(--ease)}
  .nl.on{color:var(--oceano);background:var(--dourado);border-color:var(--dourado)}
  .nl.cur{color:var(--dourado-400);border-color:rgba(203,160,82,0.5)}

  /* ---------- right: steps ---------- */
  .panel{min-width:0}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:30px}
  .brand svg{width:22px;height:22px;color:var(--dourado)}
  .brand span{font-weight:500;letter-spacing:0.22em;text-transform:uppercase;font-size:0.74rem}
  .eyebrow{color:var(--dourado-400);text-transform:uppercase;letter-spacing:0.2em;font-size:0.72rem;font-weight:600;margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:300;font-size:clamp(2.2rem,5vw,3.2rem);line-height:1.05;letter-spacing:-0.01em;margin-bottom:10px}
  h1 i{color:var(--dourado-400)}
  .lead{color:var(--txt-mut);font-size:1.02rem;font-weight:300;max-width:42ch;margin-bottom:30px}

  .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:20px;
    padding:30px 30px 28px;backdrop-filter:blur(8px);box-shadow:0 18px 50px rgba(8,21,31,0.5)}
  .stepno{font-family:var(--serif);font-size:0.95rem;color:var(--dourado-400);letter-spacing:0.05em;margin-bottom:6px}
  .card h2{font-family:var(--serif);font-weight:400;font-size:1.7rem;line-height:1.15;margin-bottom:12px;color:#fff}
  .card p{color:var(--txt-mut);font-size:0.99rem;margin-bottom:8px}
  .card p strong{color:var(--txt);font-weight:500}
  .copy{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-top:14px;
    background:var(--oceano-900);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 14px}
  .copy code{font-family:var(--sans);font-size:0.9rem;color:var(--dourado-400);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .copy button{flex:none;background:rgba(203,160,82,0.14);color:var(--dourado-400);border:0;border-radius:8px;
    font-family:var(--sans);font-size:0.78rem;font-weight:600;padding:7px 13px;cursor:pointer;transition:.2s}
  .copy button:hover{background:rgba(203,160,82,0.26)}
  .copy button.ok{background:var(--dourado);color:var(--oceano)}
  .note{font-size:0.84rem;color:var(--txt-mut);margin-top:14px;display:flex;gap:8px;align-items:flex-start}
  .note .i{color:var(--dourado-400);flex:none}
  .switch{margin-top:14px;font-size:0.82rem;color:var(--txt-mut)}
  .switch a{color:var(--dourado-400);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

  /* download button */
  .dl{display:inline-flex;align-items:center;gap:13px;margin-top:18px;background:var(--dourado);color:var(--oceano);
    font-family:var(--sans);font-weight:600;font-size:1rem;text-decoration:none;padding:16px 28px;border-radius:999px;
    transition:transform .25s var(--ease),box-shadow .25s var(--ease),background .25s;box-shadow:0 14px 40px rgba(0,0,0,0.35)}
  .dl:hover{transform:translateY(-2px);background:var(--dourado-400);box-shadow:0 20px 54px rgba(0,0,0,0.45)}
  .dl svg{width:19px;height:19px}.dl .sz{font-weight:400;opacity:0.7;font-size:0.86rem}

  /* hold-to-confirm */
  .hold{margin-top:22px;display:flex;align-items:center;gap:16px}
  .holdbtn{position:relative;width:74px;height:74px;flex:none;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none}
  .holdbtn svg{width:74px;height:74px;transform:rotate(-90deg)}
  .holdbtn .track{fill:none;stroke:rgba(255,255,255,0.14);stroke-width:4}
  .holdbtn .prog{fill:none;stroke:var(--dourado);stroke-width:4;stroke-linecap:round;
    stroke-dasharray:213.6;stroke-dashoffset:213.6}
  .holdbtn.holding .prog{transition:stroke-dashoffset 1.5s linear;stroke-dashoffset:0}
  .holdbtn .ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dourado-400)}
  .holdbtn .ic svg{width:22px;height:22px;transform:none}
  .holdtext{font-size:0.92rem;color:var(--txt)}
  .holdtext b{display:block;font-weight:600;color:#fff}
  .holdtext small{color:var(--txt-mut);font-size:0.8rem}

  /* completion */
  .done-card{text-align:center;animation:fadeUp .8s var(--ease)}
  .done-card h2{font-family:var(--serif);font-weight:300;font-size:clamp(2.4rem,6vw,3.6rem);color:#fff;line-height:1.05;margin-bottom:14px}
  .done-card h2 i{color:var(--dourado-400)}
  .done-card p{color:var(--txt-mut);max-width:36ch;margin:0 auto 26px}
  .seal{display:inline-flex;flex-direction:column;gap:3px;border:1px solid rgba(203,160,82,0.4);border-radius:14px;
    padding:14px 24px;background:rgba(203,160,82,0.06)}
  .seal .s1{font-size:0.66rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--dourado-400)}
  .seal .s2{font-family:var(--serif);font-size:1.15rem;color:#fff;letter-spacing:0.04em}
  .done-links{margin-top:30px;display:flex;gap:22px;justify-content:center;font-size:0.85rem}
  .done-links a{color:var(--txt-mut);cursor:pointer;text-decoration:underline;text-underline-offset:4px}
  .done-links a:hover{color:var(--dourado-400)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .swap{animation:fadeUp .5s var(--ease)}

  @media(max-width:820px){
    .stage{grid-template-columns:1fr;gap:18px;padding:20px 20px 44px}
    .starwrap{order:-1;gap:10px}.meta-top{position:static;margin-bottom:2px;text-align:center}
    svg.star{width:140px}
    .brand{margin-bottom:16px}
    h1{font-size:1.9rem;margin-bottom:8px}
    .lead{font-size:0.95rem;margin-bottom:18px}
    .card{padding:22px 20px}
    .card h2{font-size:1.45rem}
    .nodelabels .nl{font-size:0.62rem;padding:4px 9px}
  }
  @media(prefers-reduced-motion:reduce){
    .breathe{animation:none}.node.pulse{animation:none}
    .stage.done .glow{animation:none;opacity:0.3}
    *{transition-duration:.001ms!important}
    .holdbtn.holding .prog{transition:stroke-dashoffset .35s linear}
  }
</style>
</head>
<body>
<main class="stage" id="stage">

  <!-- ============ STAR ============ -->
  <section class="starwrap">
    <div class="meta-top">Ativação <b id="pct">0%</b></div>
    <svg class="star" viewBox="0 0 200 200" aria-hidden="true">
      <defs>
        <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>
      <circle class="corehalo" cx="100" cy="100" r="78"/>
      <g class="glow"><use href="#starpath" filter="url(#soft)" stroke="var(--dourado)" stroke-width="3" fill="none"/></g>
      <g class="breathe" id="bgrp">
        <!-- pentagram drawn in 4 segments (pathLength 100) -->
        <path id="starpath" class="ray" pathLength="100"
              d="M100,20 L147,164.7 L23.9,75.3 L176.1,75.3 L52.98,164.7 Z"/>
        <!-- vertices -->
        <circle class="node" data-v="0" cx="100"  cy="20"   r="6"/>
        <circle class="node" data-v="1" cx="147"  cy="164.7" r="6"/>
        <circle class="node" data-v="2" cx="23.9" cy="75.3"  r="6"/>
        <circle class="node" data-v="3" cx="176.1" cy="75.3" r="6"/>
        <circle class="node" data-v="4" cx="52.98" cy="164.7" r="6"/>
      </g>
    </svg>
    <div class="nodelabels" id="labels">
      <span class="nl" data-s="0">Baixar</span>
      <span class="nl" data-s="1">Abrir</span>
      <span class="nl" data-s="2">Acender</span>
      <span class="nl" data-s="3">Usar</span>
    </div>
  </section>

  <!-- ============ PANEL ============ -->
  <section class="panel">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.8H21l-5.5 4 2.1 6.8L12 15.7 6.4 19.6l2.1-6.8L3 8.8h6.8z"/></svg>
      <span>The Beat Life Club</span>
    </div>
    <p class="eyebrow">Ritual de ativação · Design System</p>
    <h1>Acenda a marca <i>no seu</i> Claude.</h1>
    <p class="lead">Quatro passos, sem pressa. A cada um, uma ponta da Estrela acende. Quando ela fecha, a skill está viva.</p>
    <div id="slot"></div>
  </section>

</main>

<a id="dl" href="Beat-Design-System-Kit.zip" download="Beat-Design-System-Kit.zip" hidden></a>

<script>
(function(){
  "use strict";
  var KEY="beat-ritual-v1";
  var stage=document.getElementById("stage");
  var slot=document.getElementById("slot");
  var dl=document.getElementById("dl");
  var pctEl=document.getElementById("pct");
  var nodes=[].slice.call(document.querySelectorAll(".node"));
  var ray=document.getElementById("starpath");
  var labels=[].slice.call(document.querySelectorAll(".nl"));
  // vertices lit per step (pentagram order)
  var STEP_VERTS=[[0,2],[4],[1],[3]];
  var OFFSETS=[75,50,25,0]; // stroke-dashoffset after each step

  function detectOS(){
    var p=(navigator.userAgentData&&navigator.userAgentData.platform)||navigator.platform||navigator.userAgent||"";
    if(/win/i.test(p))return"windows";
    if(/mac|iphone|ipad|ipod/i.test(p))return"mac";
    return"mac";
  }
  var state=load();
  function load(){
    try{var s=JSON.parse(localStorage.getItem(KEY));if(s&&typeof s.step==="number")return s;}catch(e){}
    return {step:0, os:detectOS(), serial:genSerial(), at:null};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
  function genSerial(){
    // estável por instalação; baseado no relógio do navegador no 1o load
    var n=(Date.now()%100000);
    return "BEAT-STAR-"+String(n).padStart(5,"0");
  }

  var STEPS=[
    {
      no:"Passo 1 de 4", h:"Baixe o kit",
      body:'<p>Um único arquivo <strong>.zip</strong> com a skill inteira: cores, tipografia, logos, componentes.</p><p>Ele vai direto pra sua pasta de <strong>Downloads</strong>.</p>',
      action:"download"
    },
    {
      no:"Passo 2 de 4", h:"Abra o kit",
      body:'<p>Dê dois cliques no <strong>.zip</strong> pra descompactar. No Windows, clique com o botão direito e escolha <strong>Extrair tudo</strong>.</p><p>Vira a pasta <strong>Beat-Design-System-Kit</strong>.</p>',
      action:"hold", hb:"Segure pra confirmar", hs:"Já descompactei"
    },
    {
      no:"Passo 3 de 4", h:"Acenda a skill",
      body:"os", action:"hold", hb:"Segure pra confirmar", hs:"A chama acendeu"
    },
    {
      no:"Passo 4 de 4", h:"Entre no Claude",
      body:'<p>Abra o Claude e peça pra criar algo da The Beat Life Club. Ou chame a skill pelo nome:</p>'+
           copyBlock("the-beat-life-club-design")+
           '<div class="note"><span class="i">✅</span><span>Pré-requisito: ter o <strong>Claude</strong> instalado e aberto nesta máquina.</span></div>',
      action:"hold", hb:"Segure pra confirmar", hs:"Estou dentro"
    }
  ];

  function osBody(){
    var mac='<p>Abra a pasta e <strong>clique com o botão direito</strong> em <code style="color:var(--dourado-400)">INSTALAR.command</code> &rsaquo; <strong>Abrir</strong> &rsaquo; <strong>Abrir</strong>.</p>'+
            copyBlock("INSTALAR.command")+
            '<div class="note"><span class="i">⚠️</span><span>Na 1ª vez o Mac avisa “desenvolvedor não identificado”. É normal, o botão direito resolve.</span></div>';
    var win='<p>Abra a pasta e dê <strong>dois cliques</strong> em <code style="color:var(--dourado-400)">INSTALAR.bat</code>.</p>'+
            copyBlock("INSTALAR.bat")+
            '<div class="note"><span class="i">⚠️</span><span>Se aparecer “O Windows protegeu o seu PC”: <strong>Mais informações</strong> &rsaquo; <strong>Executar assim mesmo</strong>.</span></div>';
    var other=state.os==="mac"?"windows":"mac";
    return '<p>Uma janelinha vai abrir e escrever <strong>PRONTO</strong>. Pode fechar.</p>'+
           (state.os==="mac"?mac:win)+
           '<div class="switch">Está no '+(other==="mac"?"Mac":"Windows")+'? <a id="osswitch">Ver o passo do '+(other==="mac"?"Mac":"Windows")+'</a></div>';
  }
  function copyBlock(txt){
    return '<div class="copy"><code>'+txt+'</code><button data-copy="'+txt+'">Copiar</button></div>';
  }

  function render(){
    if(state.step>=4){renderDone();return;}
    var s=STEPS[state.step];
    var body = s.body==="os" ? osBody() : s.body;
    var html='<div class="card swap"><div class="stepno">'+s.no+'</div><h2>'+s.h+'</h2>'+body;
    if(s.action==="download"){
      html+='<div><a class="dl" id="dlbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>Baixar o kit<span class="sz">· 6,9 MB</span></a></div>';
    } else {
      html+='<div class="hold"><div class="holdbtn" id="holdbtn"><svg viewBox="0 0 74 74"><circle class="track" cx="37" cy="37" r="34"/><circle class="prog" cx="37" cy="37" r="34"/></svg><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span></div><div class="holdtext"><b>'+s.hs+'</b><small>'+s.hb+'</small></div></div>';
    }
    html+='</div>';
    slot.innerHTML=html;
    wire();
    paintStar();
  }

  function wire(){
    // copy buttons
    [].slice.call(slot.querySelectorAll("[data-copy]")).forEach(function(b){
      b.addEventListener("click",function(){doCopy(b.getAttribute("data-copy"),b);});
    });
    // os switch
    var sw=slot.querySelector("#osswitch");
    if(sw)sw.addEventListener("click",function(){state.os=state.os==="mac"?"windows":"mac";save();render();});
    // download
    var dbtn=slot.querySelector("#dlbtn");
    if(dbtn)dbtn.addEventListener("click",function(e){e.preventDefault();dl.click();advance();});
    // hold
    var hb=slot.querySelector("#holdbtn");
    if(hb)bindHold(hb);
  }

  function bindHold(el){
    var done=false,active=false;
    var prog=el.querySelector(".prog");
    function start(e){e.preventDefault();if(done)return;active=true;el.classList.add("holding");}
    function cancel(){if(done)return;active=false;el.classList.remove("holding");}
    prog.addEventListener("transitionend",function(){
      if(active&&!done){done=true;el.classList.remove("holding");advance();}
    });
    el.addEventListener("pointerdown",start);
    el.addEventListener("pointerup",cancel);
    el.addEventListener("pointerleave",cancel);
    el.addEventListener("pointercancel",cancel);
  }

  function advance(){
    var i=state.step;
    // light vertices for this step + draw ray + pulse
    (STEP_VERTS[i]||[]).forEach(function(v){
      var n=nodes.filter(function(x){return +x.getAttribute("data-v")===v;})[0];
      if(n){n.classList.add("lit","pulse");setTimeout(function(){n.classList.remove("pulse");},2000);}
    });
    ray.classList.add("draw");
    ray.style.strokeDashoffset=OFFSETS[i];
    state.step=i+1;
    if(state.step>=4){state.at=new Date().toLocaleDateString("pt-BR");}
    save();
    setPct();setLabels();
    setTimeout(render,520);
  }

  function paintStar(){
    // restore visual state on load
    var lit=[];for(var i=0;i<state.step;i++){(STEP_VERTS[i]||[]).forEach(function(v){lit.push(v);});}
    nodes.forEach(function(n){if(lit.indexOf(+n.getAttribute("data-v"))>=0)n.classList.add("lit");});
    if(state.step>0){ray.classList.add("draw");ray.style.strokeDashoffset=OFFSETS[state.step-1];}
    setPct();setLabels();
  }
  function setPct(){pctEl.textContent=Math.min(100,state.step*25)+"%";}
  function setLabels(){labels.forEach(function(l,i){l.classList.toggle("on",i<state.step);l.classList.toggle("cur",i===state.step&&state.step<4);});}

  function renderDone(){
    stage.classList.add("done");
    nodes.forEach(function(n){n.classList.add("lit");});
    ray.classList.add("draw");ray.style.strokeDashoffset=0;
    setPct();setLabels();
    slot.innerHTML='<div class="done-card"><div class="stepno">Ritual completo</div>'+
      '<h2>Sua skill <i>está viva.</i></h2>'+
      '<p>A marca agora vive no seu Claude. Peça pra criar algo da The Beat Life Club e veja.</p>'+
      '<div class="seal"><span class="s1">Ativado</span><span class="s2">'+(state.at||"hoje")+' · '+state.serial+'</span></div>'+
      '<div class="done-links"><a id="again">Reabrir o ritual</a><a id="redl">Baixar o kit de novo</a></div></div>';
    var ag=slot.querySelector("#again");
    if(ag)ag.addEventListener("click",function(){
      state={step:0,os:detectOS(),serial:genSerial(),at:null};save();
      stage.classList.remove("done");
      nodes.forEach(function(n){n.classList.remove("lit","pulse");});
      ray.classList.remove("draw");ray.style.strokeDashoffset=100;
      render();
    });
    var rd=slot.querySelector("#redl");
    if(rd)rd.addEventListener("click",function(){dl.click();});
  }

  function doCopy(txt,btn){
    function ok(){var t=btn.textContent;btn.textContent="copiado";btn.classList.add("ok");setTimeout(function(){btn.textContent=t;btn.classList.remove("ok");},1500);}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok,fallback);}
    else fallback();
    function fallback(){try{var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);ok();}catch(e){}}
  }

  render();
})();
</script>
</body>
</html>
